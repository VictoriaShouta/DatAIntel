services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datAIntel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-datAIntel}
    ports:
      - "5433:5432"  # host tarafında 5433: bu makinede native PostgreSQL 17 5432'yi kullanıyor
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datAIntel}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    environment:
      PIP_ROOT_USER_ACTION: ignore
    ports:
      - "5001:5000"  # host tarafında 5001: bu makinede macOS ControlCenter/AirPlay 5000'i kullanıyor
    volumes:
      - mlflow_data:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - >
        pip install --no-cache-dir "psycopg[binary]" &&
        mlflow server --host 0.0.0.0 --port 5000
        --backend-store-uri ${MLFLOW_BACKEND_STORE_URI:-postgresql+psycopg://datAIntel:change_me@postgres:5432/mlflow}
        --default-artifact-root ${MLFLOW_ARTIFACT_ROOT:-/mlflow/artifacts}

  prometheus:
    image: prom/prometheus:v3.0.1
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  backend:
    build:
      context: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build:
      context: ./backend
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "worker.celery_app", "worker", "--loglevel=INFO"]

  beat:
    build:
      context: ./backend
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "worker.celery_app", "beat", "--loglevel=INFO"]

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

  mock_erp:
    build:
      context: ./services/mock_erp
    ports:
      - "8001:8001"

  stream_producer:
    build:
      context: ./services/stream_producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      - redpanda

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
  mlflow_data:
  prometheus_data:
  grafana_data:
